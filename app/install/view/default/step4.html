<!DOCTYPE html>
<html lang="zh">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
<title>系统安装向导 - 管理员设置</title>
<link rel="stylesheet" type="text/css" href="/static/css/materialdesignicons.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/animate.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/style.min.css">
<style>
.install-container { max-width: 700px; margin: 40px auto; }
.step-bar { display: flex; justify-content: center; margin-bottom: 30px; }
.step-item { display: flex; align-items: center; }
.step-num { width: 32px; height: 32px; border-radius: 50%; background: #e9ecef; color: #6c757d; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 8px; }
.step-item.active .step-num { background: #33cabb; color: #fff; }
.step-item.done .step-num { background: #33cabb; color: #fff; }
.step-item.done .step-num::after { content: '\F012C'; font-family: 'Material Design Icons'; font-size: 16px; }
.step-item.done .step-num span { display: none; }
.step-label { font-size: 14px; color: #6c757d; }
.step-item.active .step-label { color: #33cabb; font-weight: bold; }
.step-item.done .step-label { color: #33cabb; }
.step-line { width: 60px; height: 2px; background: #e9ecef; margin: 0 10px; }
.step-line.done { background: #33cabb; }
</style>
</head>
<body class="center-vh">
<div class="install-container">
  <div class="card card-shadowed p-5">
    <h4 class="text-center mb-4">系统安装向导</h4>

    <div class="step-bar">
      <div class="step-item done">
        <div class="step-num"><span>1</span></div>
        <div class="step-label">许可协议</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item done">
        <div class="step-num"><span>2</span></div>
        <div class="step-label">环境检测</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item done">
        <div class="step-num"><span>3</span></div>
        <div class="step-label">数据库配置</div>
      </div>
      <div class="step-line done"></div>
      <div class="step-item active">
        <div class="step-num"><span>4</span></div>
        <div class="step-label">管理员设置</div>
      </div>
    </div>

    <form id="adminForm">
      <div class="mb-3">
        <label class="form-label">网站名称</label>
        <input type="text" class="form-control" name="site_name" value="我的主机站" required>
      </div>
      <div class="mb-3">
        <label class="form-label">管理员账号</label>
        <input type="text" class="form-control" name="admin_user" placeholder="请输入管理员登录账号" required>
      </div>
      <div class="mb-3">
        <label class="form-label">管理员密码</label>
        <input type="password" class="form-control" name="admin_password" placeholder="请输入管理员登录密码" required>
      </div>
      <div class="mb-3">
        <label class="form-label">管理员昵称</label>
        <input type="text" class="form-control" name="admin_name" value="管理员">
      </div>
      <div class="mb-3">
        <label class="form-label">管理员QQ</label>
        <input type="text" class="form-control" name="admin_qq" placeholder="选填">
      </div>
      <div class="mb-3">
        <label class="form-label">管理员邮箱</label>
        <input type="email" class="form-control" name="admin_mail" placeholder="选填">
      </div>

      <div class="mt-4 d-flex justify-content-between">
        <a href="/install/index/step3" class="btn btn-secondary">上一步</a>
        <button type="submit" class="btn btn-primary" id="submitBtn">完成安装</button>
      </div>
    </form>
  </div>
</div>

<script type="text/javascript" src="/static/js/jquery.min.js"></script>
<script type="text/javascript" src="/static/js/bootstrap-notify.min.js"></script>
<script type="text/javascript">
$('#adminForm').on('submit', function(event) {
    event.preventDefault();
    var $data = $(this).serialize();
    $('#submitBtn').prop('disabled', true).text('正在安装...');
    
    $.post('', $data, function(res) {
        if (res.code == 1) {
            $.notify({
                message: '安装完成，即将跳转...',
            }, {
                type: 'success',
                placement: { from: 'top', align: 'right' },
                delay: 1500
            });
            setTimeout(function() {
                location.href = '/install/index/done';
            }, 1500);
        } else {
            $.notify({
                message: '安装失败：' + res.msg,
            }, {
                type: 'danger',
                placement: { from: 'top', align: 'right' },
                delay: 3000
            });
            $('#submitBtn').prop('disabled', false).text('完成安装');
        }
    }).fail(function() {
        $.notify({
            message: '服务器错误',
        }, {
            type: 'danger',
            placement: { from: 'top', align: 'right' },
            delay: 2000
        });
        $('#submitBtn').prop('disabled', false).text('完成安装');
    });
});
</script>
</body>
</html>
