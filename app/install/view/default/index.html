<!DOCTYPE html>
<html lang="zh">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
<title>系统安装向导</title>
<link rel="stylesheet" type="text/css" href="/static/css/materialdesignicons.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/animate.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/style.min.css">
<style>
.install-container { max-width: 700px; margin: 40px auto; }
.step-bar { display: flex; justify-content: center; margin-bottom: 30px; }
.step-item { display: flex; align-items: center; }
.step-num { width: 32px; height: 32px; border-radius: 50%; background: #e9ecef; color: #6c757d; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 8px; }
.step-item.active .step-num { background: #33cabb; color: #fff; }
.step-item.done .step-num { background: #33cabb; color: #fff; }
.step-item.done .step-num::after { content: '\F012C'; font-family: 'Material Design Icons'; font-size: 16px; }
.step-item.done .step-num span { display: none; }
.step-label { font-size: 14px; color: #6c757d; }
.step-item.active .step-label { color: #33cabb; font-weight: bold; }
.step-item.done .step-label { color: #33cabb; }
.step-line { width: 60px; height: 2px; background: #e9ecef; margin: 0 10px; }
.step-line.done { background: #33cabb; }
.license-box { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 4px; padding: 20px; max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.8; margin-bottom: 20px; }
</style>
</head>
<body class="center-vh">
<div class="install-container">
  <div class="card card-shadowed p-5">
    <h4 class="text-center mb-4">系统安装向导</h4>

    <div class="step-bar">
      <div class="step-item active">
        <div class="step-num"><span>1</span></div>
        <div class="step-label">许可协议</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num"><span>2</span></div>
        <div class="step-label">环境检测</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num"><span>3</span></div>
        <div class="step-label">数据库配置</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num"><span>4</span></div>
        <div class="step-label">管理员设置</div>
      </div>
    </div>

    <div class="license-box">
      <p><strong>MNBT-SALE 虚拟主机销售系统</strong></p>
      <p>版权所有 (c) 本项目开发者。保留所有权利。</p>
      <p>本软件授权您在遵守以下条件的前提下使用：</p>
      <p>1. 本软件按"原样"提供，不做任何明示或暗示的保证。</p>
      <p>2. 您不得将本软件用于任何非法用途。</p>
      <p>3. 使用本软件搭建的网站内容需遵守当地法律法规。</p>
      <p>4. 因使用本软件造成的任何损失，开发者不承担任何责任。</p>
      <p>5. 请确保您的服务器环境满足系统运行要求。</p>
    </div>

    <div class="form-check mb-4">
      <input type="checkbox" class="form-check-input" id="agree">
      <label class="form-check-label" for="agree">我已阅读并同意以上许可协议</label>
    </div>

    <div class="d-grid">
      <button class="btn btn-primary" id="nextBtn" disabled>下一步</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="/static/js/jquery.min.js"></script>
<script type="text/javascript">
$('#agree').on('change', function() {
    $('#nextBtn').prop('disabled', !$(this).is(':checked'));
});
$('#nextBtn').on('click', function() {
    location.href = '/install/index/step2';
});
</script>
</body>
</html>
