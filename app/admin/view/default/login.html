<!DOCTYPE html>
<html lang="zh">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
<title>{$webname} - 后台登录</title>
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="stylesheet" type="text/css" href="/static/css/materialdesignicons.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/animate.min.css">
<link rel="stylesheet" type="text/css" href="/static/css/style.min.css">
<style>
html, body {
  height: 100%;
}
body.admin-login {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  background:
    radial-gradient(ellipse at top left, rgba(0, 82, 204, 0.12), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(7, 71, 166, 0.1), transparent 45%),
    linear-gradient(160deg, #f0f4f8 0%, #e8eef5 50%, #f5f7fa 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
}
.login-card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(23, 43, 77, 0.1), 0 2px 8px rgba(23, 43, 77, 0.04);
  border: 1px solid rgba(223, 225, 230, 0.8);
  padding: 40px 36px 36px;
}
.login-brand {
  text-align: center;
  margin-bottom: 32px;
}
.login-brand-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 16px;
  border-radius: 14px;
  background: linear-gradient(135deg, #0052cc 0%, #0747a6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 28px;
  box-shadow: 0 8px 20px rgba(0, 82, 204, 0.28);
}
.login-brand h1 {
  margin: 0 0 6px;
  font-size: 22px;
  font-weight: 600;
  color: #172b4d;
  letter-spacing: -0.02em;
}
.login-brand p {
  margin: 0;
  font-size: 13px;
  color: #6b778c;
}
.signin-form .form-group {
  margin-bottom: 18px;
}
.signin-form .form-label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  font-weight: 500;
  color: #42526e;
}
.signin-form .input-wrap {
  position: relative;
}
.signin-form .input-wrap .mdi {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  text-align: center;
  color: #97a0af;
  font-size: 18px;
  pointer-events: none;
  z-index: 2;
}
.signin-form .form-control {
  height: 44px;
  padding: 10px 14px 10px 40px;
  border: 1px solid #dfe1e6;
  border-radius: 8px;
  font-size: 14px;
  color: #172b4d;
  background: #fafbfc;
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
.signin-form .form-control::placeholder {
  color: #a5adba;
}
.signin-form .form-control:hover {
  border-color: #c1c7d0;
  background: #fff;
}
.signin-form .form-control:focus {
  border-color: #0052cc;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.15);
  outline: none;
}
.captcha-row {
  display: flex;
  gap: 12px;
  align-items: stretch;
}
.captcha-row .input-wrap {
  flex: 1;
  min-width: 0;
}
.captcha-img-wrap {
  flex: 0 0 128px;
  height: 44px;
  border-radius: 8px;
  border: 1px solid #dfe1e6;
  overflow: hidden;
  background: #f4f5f7;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.captcha-img-wrap:hover {
  border-color: #0052cc;
  box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1);
}
.captcha-img-wrap img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.btn-login {
  width: 100%;
  height: 44px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #0052cc 0%, #0747a6 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.btn-login:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(0, 82, 204, 0.35);
  color: #fff;
}
.btn-login:active:not(:disabled) {
  transform: translateY(0);
}
.btn-login:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}
.login-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 12px;
  color: #97a0af;
}
@media (max-width: 480px) {
  .login-card {
    padding: 32px 22px 28px;
  }
  .captcha-img-wrap {
    flex-basis: 110px;
  }
}
</style>
</head>

<body class="admin-login">
<div class="login-card">
  <div class="login-brand">
    <div class="login-brand-icon">
      <span class="mdi mdi-shield-account" aria-hidden="true"></span>
    </div>
    <h1>管理后台</h1>
    <p>{$webname}</p>
  </div>

  <form action="" method="post" class="signin-form needs-validation" novalidate>
    <div class="form-group">
      <label class="form-label" for="username">用户名</label>
      <div class="input-wrap">
        <span class="mdi mdi-account" aria-hidden="true"></span>
        <input type="text" class="form-control" name="user" id="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">密码</label>
      <div class="input-wrap">
        <span class="mdi mdi-lock" aria-hidden="true"></span>
        <input type="password" class="form-control" name="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="captcha-input">验证码</label>
      <div class="captcha-row">
        <div class="input-wrap">
          <span class="mdi mdi-shield-check" aria-hidden="true"></span>
          <input type="text" name="captcha" id="captcha-input" class="form-control" placeholder="请输入验证码" required autocomplete="off">
        </div>
        <div class="captcha-img-wrap" title="点击刷新验证码">
          <img id="captcha" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();" alt="验证码">
        </div>
      </div>
    </div>

    <button class="btn btn-login" type="submit">立即登录</button>
  </form>

  <div class="login-footer">仅限授权管理员访问</div>
</div>

<script type="text/javascript" src="/static/js/jquery.min.js"></script>
<script type="text/javascript" src="/static/js/popper.min.js"></script>
<script type="text/javascript" src="/static/js/bootstrap.min.js"></script>
<script type="text/javascript" src="/static/js/lyear-loading.js"></script>
<script type="text/javascript" src="/static/js/bootstrap-notify.min.js"></script>
<script type="text/javascript">
var loader;
$(document).ajaxStart(function(){
    $("button:submit").html('登录中...').attr("disabled", true);
    loader = $('button:submit').lyearloading({
        opacity: 0.2,
        spinnerSize: 'nm'
    });
}).ajaxStop(function(){
    loader.destroy();
    $("button:submit").html('立即登录').attr("disabled", false);
});
$('.signin-form').on('submit', function(event) {
    if ($(this)[0].checkValidity() === false) {
        event.preventDefault();
        event.stopPropagation();
        $(this).addClass('was-validated');
        return false;
    }

    var $data  = $(this).serialize();

    $.post($(this).attr('action'), $data, function(res) {
        if (res.code=="1") {
            $.notify({
	            message: '登录成功，页面即将跳转~',
	        },{
	            type: 'success',
	            placement: {
	            	from: 'top',
	            	align: 'right'
	            },
	            z_index: 10800,
	            delay: 1500,
                animate: {
                    enter: 'animate__animated animate__fadeInUp',
                    exit: 'animate__animated animate__fadeOutDown'
                }
	        });
            setTimeout(function () {
                location.href = '/admin/index';
            }, 1500);
        } else {
            $.notify({
	            message: '登录失败，错误原因：' + res.msg,
	        },{
	            type: 'danger',
	            placement: {
	            	from: 'top',
	            	align: 'right'
	            },
	            z_index: 10800,
	            delay: 1500,
                animate: {
                    enter: 'animate__animated animate__shakeX',
                    exit: 'animate__animated animate__fadeOutDown'
                }
	        });
			$('#password').val('');
            $("#captcha").click();
        }
    }).fail(function () {
        $.notify({
	        message: '服务器错误',
	    },{
	        type: 'danger',
	        placement: {
	        	from: 'top',
	        	align: 'right'
	        },
	        z_index: 10800,
	        delay: 1500,
            animate: {
                enter: 'animate__animated animate__shakeX',
                exit: 'animate__animated animate__fadeOutDown'
            }
	    });
    });

    return false;
});
</script>
</body>
</html>
