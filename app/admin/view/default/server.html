{include file="default/header" title="服务器列表 "/}
  <!--页面主要内容-->

         <style>
.pagination {
	display:inline-block;
	padding-left:0;
	margin:20px 0;
	border-radius:4px
}
.pagination>li {
	display:inline
}
.pagination>li>a,.pagination>li>span {
	position:relative;
	float:left;
	padding:6px 12px;
	margin-left:-1px;
	line-height:1.42857143;
	color:#0b5ed7;
	text-decoration:none;
	background-color:#fff;
	border:1px solid #ddd
}
.pagination>li:first-child>a,.pagination>li:first-child>span {
	margin-left:0;
	border-top-left-radius:4px;
	border-bottom-left-radius:4px
}
.pagination>li:last-child>a,.pagination>li:last-child>span {
	border-top-right-radius:4px;
	border-bottom-right-radius:4px
}
.pagination>li>a:focus,.pagination>li>a:hover,.pagination>li>span:focus,.pagination>li>span:hover {
	z-index:2;
	color:#23527c;
	background-color:#eee;
	border-color:#ddd
}
.pagination>.active>a,.pagination>.active>a:focus,.pagination>.active>a:hover,.pagination>.active>span,.pagination>.active>span:focus,.pagination>.active>span:hover {
	z-index:3;
	color:#fff;
	cursor:default;
	background-color:#0b5ed7;
	border-color:#0b5ed7
}
.pagination>.disabled>a,.pagination>.disabled>a:focus,.pagination>.disabled>a:hover,.pagination>.disabled>span,.pagination>.disabled>span:focus,.pagination>.disabled>span:hover {
	color:#777;
	cursor:not-allowed;
	background-color:#fff;
	border-color:#ddd
}
.pagination-lg>li>a,.pagination-lg>li>span {
	padding:10px 16px;
	font-size:18px;
	line-height:1.3333333
}
.pagination-lg>li:first-child>a,.pagination-lg>li:first-child>span {
	border-top-left-radius:6px;
	border-bottom-left-radius:6px
}
.pagination-lg>li:last-child>a,.pagination-lg>li:last-child>span {
	border-top-right-radius:6px;
	border-bottom-right-radius:6px
}
.pagination-sm>li>a,.pagination-sm>li>span {
	padding:5px 10px;
	font-size:12px;
	line-height:1.5
}
.pagination-sm>li:first-child>a,.pagination-sm>li:first-child>span {
	border-top-left-radius:3px;
	border-bottom-left-radius:3px
}
.pagination-sm>li:last-child>a,.pagination-sm>li:last-child>span {
	border-top-right-radius:3px;
	border-bottom-right-radius:3px
}
</style>
    <main class="lyear-layout-content">	
      <div class="container-fluid">
        <div class="row">
<div class="col-lg-12">
      <div class="card">
        <header class="card-header">
<div class="card-title">服务器列表</div>
</header>
        <div class="card-body">
<form method="get" action="">

<div class="input-group">
					<input class="form-control col-sm-7" type="text" name="search" placeholder="搜索..." value=""/>

					<div class="input-group-append">
						<button class="btn-copy btn btn-primary">
							<span class="mdi mdi-magnify"></span>搜索
						</button>
					</div>

				</div>
</form>
<br/>
<button onclick='add()' class="btn btn-primary me-1"><span class="mdi mdi-plus" aria-hidden="true"></span>添加服务器</button>
<button onclick='del()' class="btn btn-danger">
                    <span class="mdi mdi-window-close" aria-hidden="true"></span>删除
                  </button>

                  <button onclick='qbdel()' class="btn btn-danger">
                    <span class="mdi mdi-window-close" aria-hidden="true"></span>全部删除
                  </button>
<br/><br/>
<div class="table-responsive-sm">
          <table class="table table-bordered">
            <thead>
              <tr>
<th>
                          <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="check-all">
                            <label class="form-check-label" for="check-all"></label>
                          </div>
                        </th>
                <th scope="col">ID</th>
                <th scope="col">名称</th>
                <th scope="col">服务器插件</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody>
{foreach $server as $s}

              <tr>
<td>
                          <div class="form-check">
                            <input type="checkbox" class="form-check-input ids" name="ids" value="{$s.id}">
                            <label class="form-check-label" for="ids-1"></label>
                          </div>
                        </td>
                <td scope="row">{$s.id}</td>
                <td>{$s.name}</td>
     <td>{$s.serverplugins}</td>
     
<td>
<a href="/admin/server/{$s.id}" class="btn btn-success btn-sm me-1"><i class="mdi mdi-pencil"></i>编辑</a>

</td>
              </tr>
{/foreach}
            </tbody>
          </table>
</div>

<div style="text-align:center">{$server->render()}</div>

</div>
</div>

</div>
</div>
</main>


  {include file="default/footer" /}
<style>
.server-add-tip {
  background: #deebff;
  border: 1px solid #b3d4ff;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 14px;
  font-size: 12.5px;
  color: #0747a6;
  line-height: 1.55;
}
.server-add-tip strong { display: block; margin-bottom: 4px; }
.server-field-hint {
  display: block;
  margin-top: 4px;
  font-size: 12px;
  color: #6b778c;
  line-height: 1.45;
}
.server-field-hint em { color: #de350b; font-style: normal; }
.layer-server-add .layui-layer-content {
  max-height: 72vh !important;
  overflow-y: auto !important;
}
</style>
<script>
function add(){
layer.open({
        type: 1,
        area: ['560px', 'auto'],
        maxHeight: Math.min(window.innerHeight * 0.88, 720),
        closeBtn: 1,
        shift: 7,
        shadeClose: true,
        skin: 'layer-server-add',
        title: "添加服务器",
        content: ''
          + '<div class="card-body" style="width:520px;max-width:100%;padding:18px 20px 12px;box-sizing:border-box;">'
          + '<form action="" method="post" id="myform" class="edit-form">'
          + '<input type="hidden" name="act" value="add">'
          + '<div class="server-add-tip">'
          + '<strong>梦奈宝塔对接说明</strong>'
          + '主机只填域名或IP，不要带 http:// 或 https://。<br>'
          + '安全码 = 系统 API；账号 = 宝塔编号；密码 = 调用密钥。<br>'
          + '非 80/443 请填端口；https 访问请开启 SSL。插件请选 <b>mnbt</b>。'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">名称</label>'
          + '<input class="form-control" type="text" name="name" value="" placeholder="例如：梦奈主节点">'
          + '<span class="server-field-hint">后台显示用的名称，随意填写</span>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">主机 <em style="color:#de350b">*</em></label>'
          + '<input class="form-control" type="text" name="host" value="" placeholder="bt.example.com 或 1.2.3.4">'
          + '<span class="server-field-hint"><em>不要</em>填写 http:// 或路径，只填域名/IP。销售站需能访问该地址</span>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">IP</label>'
          + '<input class="form-control" type="text" name="ip" value="" placeholder="可选，公网 IP">'
          + '<span class="server-field-hint">可选备注，一般不影响开通接口</span>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">安全码（系统 API）</label>'
          + '<textarea class="form-control" name="security" style="height:88px" placeholder="梦奈宝塔系统 API 安全码"></textarea>'
          + '<span class="server-field-hint">对应梦奈宝塔「系统 API / 安全码」</span>'
          + '</div>'
          + '<div class="row">'
          + '<div class="col-md-6 mb-3">'
          + '<label class="form-label">端口</label>'
          + '<input class="form-control" type="text" name="port" value="80" placeholder="80 或 443 或其他">'
          + '<span class="server-field-hint">面板实际端口，默认 80</span>'
          + '</div>'
          + '<div class="col-md-6 mb-3">'
          + '<label class="form-label">是否开启 SSL</label>'
          + '<select name="ssl" class="form-select"><option value="0" selected>关闭（http）</option><option value="1">开启（https）</option></select>'
          + '<span class="server-field-hint">地址是 https 就选开启</span>'
          + '</div>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">账号（宝塔编号）</label>'
          + '<input class="form-control" type="text" name="user" value="" placeholder="梦奈里该服务器的宝塔编号">'
          + '<span class="server-field-hint">梦奈宝塔 → 服务器列表里的<strong>宝塔编号</strong></span>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">密码（调用密钥）</label>'
          + '<input class="form-control" type="text" name="password" value="" placeholder="该服务器的调用密钥">'
          + '<span class="server-field-hint">梦奈宝塔 → 对应服务器的<strong>调用密钥</strong></span>'
          + '</div>'
          + '<div class="mb-3">'
          + '<label class="form-label">服务器插件</label>'
          + '<select name="serverplugins" class="form-select"><option value="">无</option>{volist name="plugins" id="p"}<option value="{$p}">{$p}</option>{/volist}</select>'
          + '<span class="server-field-hint">对接梦奈请选择 <b>mnbt</b>；EasyPanel 选 easypanel</span>'
          + '</div>'
          + '<div class="d-flex gap-2" style="padding-bottom:8px">'
          + '<button type="button" onclick="add1()" class="btn btn-primary">添加</button>'
          + '<button type="button" onclick="layer.closeAll()" class="btn btn-secondary">取消</button>'
          + '</div>'
          + '</form></div>',
  });

}

function add1(){
             var load = layer.msg('添加中，请稍后...',{icon:16,time:false});
 var form = $('#myform').serializeArray();
       $.ajax({
            type:'POST',
            url:'',
data:form,
            dataType:'json',
            success:function (data){
                layer.close(load)
                if(data.code == 1){
                    setTimeout(function (){
                        location.href = ''
                    },1000);
                    layer.alert(data.msg,{icon:1});
                }else{
                    layer.msg(data.msg,{icon:2});
                }
            }
        });
    }




function del(){
var id = [];
$("input[name='ids']:checked").each(function(i){
        id[i] =$(this).val();
      });
var id = id.join(",");
if(id==""){
layer.alert("未选择服务器!",{icon:2,shade:0.8});
}else{
        layer.confirm('确定要删除ID为<span style="color:#0b5ed7">'+ id +'</span>的服务器吗？', function (){
            del1(id)
        });
    }
}

    function del1(id){
        var load = layer.load('1',{time:false});

        $.ajax({
            type:'POST',
            url:'',
            data:{
                act:'delete',
                cid:id
            },
            dataType:'json',
            success:function (data){
                layer.close(load);
                if(data.code == 1){
layer.alert(data.msg,{icon:1},function(){
                        window.location.href = "";
                    });
                }else{
                    layer.alert(data.msg,{icon:2});
                }
            }
        });
    }

function qbdel(){
        layer.confirm('确定要删除<span style="color:#0b5ed7">全部</span>的服务器吗？', function (){
            qbdel1()
        });
    }


    function qbdel1(){
        var load = layer.load('1',{time:false});

        $.ajax({
            type:'POST',
            url:'',
            data:{
                act:'qbdelete',
            },
            dataType:'json',
            success:function (data){
                layer.close(load);
                if(data.code == 1){
layer.alert(data.msg,{icon:1},function(){
                        window.location.href = "";
                    });
                }else{
                    layer.alert(data.msg,{icon:2});
                }
            }
        });
    }
</script>
