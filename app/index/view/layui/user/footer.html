            </div>
            <div class="user-footer">
                <span>&copy; {:date('Y')} {$webname} {if isset($templateset['网站备案号']) && $templateset['网站备案号']}<a href="//beian.miit.gov.cn/">{$templateset['网站备案号']}</a>{/if}</span>
            </div>
        </main>
    </div>

    <script src="/static/assets/js/oneui.core.min.js"></script>
    <script src="/static/assets/js/oneui.app.min.js"></script>
    <script src="/static/assets/vendor/layer/layer.js"></script>

    <script>
        document.getElementById('mobileMenuBtn').addEventListener('click', function(){
            document.getElementById('userSidebar').classList.toggle('mobile-open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function(){
            document.getElementById('userSidebar').classList.remove('mobile-open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        });
        document.querySelectorAll('.submenu-toggle').forEach(function(btn){
            btn.addEventListener('click', function(){
                var sub = this.nextElementSibling;
                if(sub && sub.classList.contains('nav-submenu')){
                    sub.classList.toggle('open');
                    var arrow = this.querySelector('.arrow');
                    if(arrow) arrow.classList.toggle('open');
                }
            });
        });
    </script>
