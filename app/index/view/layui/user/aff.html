{include file="layui/user/header" title="推广中心" /}
    <style>
        .form-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; max-width: 500px; margin: 0 auto; }
        .form-card .card-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-size: 15px; font-weight: 600; color: #333; }
        .form-card .card-body { padding: 20px; line-height: 1.8; }
    </style>
    <div class="form-card">
        <div class="card-header">开启推广</div>
        <div class="card-body">
            <p>开启后获取你的专属推广链接，分享给其他人在本网站购买、续费产品、升级产品，收益自动到账"推广余额"！</p>
            <p>"推广余额"可提现余额也可以提现到<span style="color:#FF5722;">支付宝</span>！</p>
            <p>还在等什么？快来开启你的推广赚钱之路吧！</p>
            <br>
            <button onclick="affon()" class="layui-btn layui-btn-fluid">开启推广赚钱</button>
        </div>
    </div>
{include file="layui/user/footer" /}
<script>
    function affon(){
        var load = layer.msg('开启中...',{icon:16,time:false});
        $.ajax({ type:'POST', url:'', data:{}, dataType:'json',
            success:function(data){ layer.close(load);
                if(data.code == 1){ layer.msg(data.msg,{icon:1}, function(){ location.href = ''; }); }
                else { layer.alert(data.msg,{icon:2}); }
            }
        });
    }
</script>
