{include file="layui/user/header" title="产品过户" /}
    <style>
        .form-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; }
        .form-card .card-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-size: 15px; font-weight: 600; color: #333; }
        .form-card .card-body { padding: 20px; }
        .captcha-row { display: flex; gap: 10px; align-items: flex-start; }
        .captcha-row img { height: 42px; cursor: pointer; border: 1px solid #e8e8e8; border-radius: 4px; }
        .code-row { display: flex; gap: 10px; }
        .code-row input { flex: 1; }
    </style>
    <div class="form-card">
        <div class="card-header">产品过户</div>
        <div class="card-body">
            <form id="transferForm">
                <div class="layui-form-item">
                    <label class="layui-form-label">产品</label>
                    <div class="layui-input-block">
                        <select name="orderid" class="layui-input">
                            <option value="">不选择</option>
                            {foreach $order as $o}<option value="{$o.id}">ID:{$o.id}=>{$o.cartid}</option>{/foreach}
                        </select>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">验证码</label>
                    <div class="layui-input-block">
                        <div class="captcha-row">
                            <div style="flex:1;"><input type="text" name="captcha" placeholder="验证码" class="layui-input"></div>
                            <img id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">邮箱验证码</label>
                    <div class="layui-input-block">
                        <div class="code-row">
                            <input type="text" name="code" placeholder="请输入邮箱验证码" class="layui-input">
                            <button type="button" class="layui-btn" onclick="getCode()">获取验证码</button>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">用户ID</label>
                    <div class="layui-input-block"><input type="text" name="newuserid" placeholder="请输入它的用户ID" class="layui-input"></div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-input-block" style="margin-left:0;">
                        <button type="submit" class="layui-btn layui-btn-fluid">提交</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
{include file="layui/user/footer" /}
<script>
    function getCode(){
        var captcha = $("input[name='captcha']").val();
        if(!captcha){ layer.alert('验证码不可为空！',{icon:2}); return; }
        $.ajax({ type:'POST', url:'', data:{ act:'validate', captcha:captcha }, dataType:'json',
            success:function(data){
                if(data.code==1){ layer.alert(data.msg,{icon:1}); }
                else { document.getElementById("randimg").src='{:captcha_src()}?'+Math.random(); layer.alert(data.msg,{icon:2}); }
            }
        });
    }
        $('#transferForm').on('submit', function(){
            var orderid = $("select[name='orderid']").val();
            if(!orderid){ layer.alert('请选择产品！',{icon:2}); return false; }
            var load = layer.msg('提交中...',{icon:16,time:false});
            $.ajax({ type:'POST', url:'', data:{ act:'transfer', code:$("input[name='code']").val(), orderid:orderid, newuserid:$("input[name='newuserid']").val() }, dataType:'json',
                success:function(res){ layer.close(load);
                    if(res.code==1){ layer.msg(res.msg,{icon:1}, function(){ location.href=''; }); }
                    else { layer.alert(res.msg,{icon:2}); }
                }
            });
            return false;
        });
</script>
