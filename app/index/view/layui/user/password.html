{include file="layui/user/header" title="修改密码" /}
    <style>
        .form-card { background: #fff; border-radius: 8px; border: 1px solid #e8e8e8; max-width: 500px; margin: 0 auto; }
        .form-card .card-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-size: 15px; font-weight: 600; color: #333; }
        .form-card .card-body { padding: 20px; }
        .tab-btns { display: flex; gap: 0; margin-bottom: 18px; }
        .tab-btns .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #e8e8e8; font-size: 14px; transition: all 0.2s; background: #f9fafb; color: #666; }
        .tab-btns .tab-btn:first-child { border-radius: 6px 0 0 6px; }
        .tab-btns .tab-btn:last-child { border-radius: 0 6px 6px 0; }
        .tab-btns .tab-btn.active { background: #1E9FFF; color: #fff; border-color: #1E9FFF; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .captcha-row { display: flex; gap: 10px; align-items: flex-start; }
        .captcha-row img { height: 42px; cursor: pointer; border: 1px solid #e8e8e8; border-radius: 4px; }
        .code-row { display: flex; gap: 10px; }
        .code-row input { flex: 1; }
    </style>
    <div class="form-card">
        <div class="card-header">修改密码</div>
        <div class="card-body">
            <div class="tab-btns">
                <div class="tab-btn active" onclick="switchTab('jmmyz')">旧密码验证</div>
                <div class="tab-btn" onclick="switchTab('yxyz')">邮箱验证</div>
            </div>
            <div id="jmmyz" class="tab-content active">
                <form id="form1">
                    <div class="layui-form-item">
                        <input type="password" name="userPwd" placeholder="请输入旧密码" class="layui-input">
                    </div>
                    <div class="layui-form-item">
                        <input type="password" name="newUserPwd" placeholder="请输入新密码" class="layui-input">
                    </div>
                    <div class="layui-form-item">
                        <input type="password" name="newUserRepwd" placeholder="再次输入新密码" class="layui-input">
                    </div>
                    <div class="layui-form-item">
                        <button type="submit" class="layui-btn layui-btn-fluid">修改</button>
                    </div>
                </form>
            </div>
            <div id="yxyz" class="tab-content">
                <form id="form2">
                    <div class="layui-form-item">
                        <input type="text" name="mail" value="{$user.mail}" readonly class="layui-input">
                    </div>
                    <div class="layui-form-item">
                        <div class="captcha-row">
                            <div style="flex:1;"><input type="text" name="captcha" placeholder="验证码" class="layui-input"></div>
                            <img id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="code-row">
                            <input type="text" name="code" placeholder="请输入邮箱验证码" class="layui-input">
                            <button type="button" class="layui-btn" onclick="getCode()">获取验证码</button>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <input type="password" name="newpass" placeholder="请输入新的密码" class="layui-input">
                    </div>
                    <div class="layui-form-item">
                        <button type="submit" class="layui-btn layui-btn-fluid">修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{include file="layui/user/footer" /}
<script>
    function switchTab(id){ document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', false); }); event.target.classList.add('active'); document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.toggle('active', c.id===id); }); }
    function getCode(){
        var captcha = $("input[name='captcha']").val();
        if(!captcha){ layer.alert('验证码不可为空！',{icon:2}); return; }
        $.ajax({ type:'POST', url:'', data:{ act:"validate", captcha:captcha }, dataType:'json',
            success:function(data){
                if(data.code == 1){ layer.alert(data.msg,{icon:1}); }
                else { document.getElementById("randimg").src='{:captcha_src()}?'+Math.random(); layer.alert(data.msg,{icon:2}); }
            }
        });
    }
        $("#form1").on('submit', function(){
            var load = layer.msg('修改中...',{icon:16,time:false});
            $.ajax({ type:'POST', url:'', data:{ act:"jmmxg", userPwd:$("input[name='userPwd']").val(), newUserPwd:$("input[name='newUserPwd']").val(), newUserRepwd:$("input[name='newUserRepwd']").val() }, dataType:'json',
                success:function(res){ layer.close(load); layer.alert(res.msg,{icon: res.code==1?1:2}); }
            });
            return false;
        });
        $("#form2").on('submit', function(){
            var load = layer.msg('修改中...',{icon:16,time:false});
            $.ajax({ type:'POST', url:'', data:{ act:"yxmmxg", code:$("input[name='code']").val(), newpass:$("input[name='newpass']").val() }, dataType:'json',
                success:function(res){ layer.close(load);
                    if(res.code==1){ layer.msg(res.msg,{icon:1}, function(){ location.href = ''; }); }
                    else { layer.alert(res.msg,{icon:2}); }
                }
            });
            return false;
        });
</script>
