<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 注册</title>
    {include file="layui/index/header" /}
    <style>
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 60px); padding: 60px 20px; background: #f5f7fa; }
        .auth-card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 430px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .auth-card h2 { text-align: center; font-size: 22px; color: #333; margin-bottom: 6px; }
        .auth-card > p { text-align: center; color: #999; font-size: 14px; margin-bottom: 28px; }
        .captcha-row { display: flex; gap: 10px; align-items: flex-start; }
        .captcha-row .layui-input-block { margin-left: 0; flex: 1; }
        .captcha-row img { height: 42px; cursor: pointer; border: 1px solid #e8e8e8; border-radius: 4px; }
        .code-row { display: flex; gap: 10px; }
        .code-row input { flex: 1; }
        .code-row button { white-space: nowrap; }
        .auth-footer { text-align: center; margin-top: 18px; color: #999; font-size: 13px; }
        .auth-footer a { color: #1E9FFF; text-decoration: none; }
    </style>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>用户注册</h2>
            <p>欢迎您的加入！</p>

            <form id="regForm">
                <div class="layui-form-item">
                    <input type="text" name="userName" placeholder="请输入昵称" autocomplete="off" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="text" name="userUser" placeholder="请输入账号" autocomplete="off" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="password" name="userPwd" placeholder="请输入密码" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="password" name="userRepwd" placeholder="再次输入密码" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="text" name="userQq" placeholder="请输入QQ" class="layui-input">
                </div>
                {if $zcyxyz=="1"}
                <div class="layui-form-item">
                    <input type="email" name="userMail" placeholder="请输入邮箱" class="layui-input">
                </div>
                {/if}
                <div class="layui-form-item">
                    <div class="captcha-row">
                        <div style="flex:1;">
                            <input type="text" name="captcha" placeholder="验证码" class="layui-input">
                        </div>
                        <img id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                    </div>
                </div>
                {if $zcyxyz=="1"}
                <div class="layui-form-item">
                    <div class="code-row">
                        <input type="text" name="code" id="code" placeholder="请输入邮箱验证码" class="layui-input">
                        <button type="button" class="layui-btn" onclick="sendMailCode()">获取验证码</button>
                    </div>
                </div>
                {/if}
                <div class="layui-form-item">
                    <button type="submit" class="layui-btn layui-btn-fluid">注册</button>
                </div>
                <div class="auth-footer">
                    <p>已有账户？ <a href="/login">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>

    {include file="layui/index/footer" /}
    <script>
        var zcyxyz = '{$zcyxyz}';
        {if $zcyxyz=="1"}
        function sendMailCode(){
            var mail = $("input[name='userMail']").val();
            var captcha = $("input[name='captcha']").val();
            if(!mail || !captcha){ layer.msg('请填写邮箱和验证码',{icon:2}); return; }
            $.ajax({ type:'POST', url:'', data:{ mail:mail, act:"yxvalidate", captcha:captcha }, dataType:'json',
                success:function(data){
                    if(data.code == 1){ layer.msg(data.msg,{icon:1}); }
                    else { document.getElementById("randimg").src='{:captcha_src()}?'+Math.random(); layer.msg(data.msg,{icon:2}); }
                }
            });
        }
        {/if}

        $(function(){
            $('#regForm').on('submit', function(){
                var btn = $("button[type='submit']");
                btn.attr('disabled', true).text('注册中...');
                var ajaxData = {
                    name: $("input[name='userName']").val(), user: $("input[name='userUser']").val(),
                    password: $("input[name='userPwd']").val(), repassword: $("input[name='userRepwd']").val(),
                    qq: $("input[name='userQq']").val()
                };
                if(zcyxyz == '1'){
                    ajaxData.act = "yxzc"; ajaxData.mail = $("input[name='userMail']").val(); ajaxData.code = $("input[name='code']").val();
                } else {
                    ajaxData.act = "ptzc"; ajaxData.captcha = $("input[name='captcha']").val();
                }
                $.ajax({ type:'POST', url:'', data:ajaxData, dataType:'json',
                    success:function(res){
                        if(res.code == 1){ layer.msg(res.msg, {icon:1}, function(){ location.href = '/login'; }); }
                        else { document.getElementById("randimg").src='{:captcha_src()}?'+Math.random(); btn.attr('disabled', false).text('注册'); layer.msg(res.msg, {icon:2}); }
                    }
                });
                return false;
            });
        });
    </script>
