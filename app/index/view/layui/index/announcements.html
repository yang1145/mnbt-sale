<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 公告列表</title>
    {include file="layui/index/header" /}
    <style>
        .main-content { padding: 40px 0 60px; min-height: calc(100vh - 60px - 300px); background: #f5f7fa; }
        .page-header { text-align: center; margin-bottom: 32px; }
        .page-header h1 { font-size: 24px; color: #333; }
        .announcement-list { max-width: 800px; margin: 0 auto; }
        .announcement-item { background: #fff; padding: 20px 24px; margin-bottom: 12px; border: 1px solid #e8e8e8; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
        .announcement-item:hover { border-color: #1E9FFF; }
        .announcement-info { flex: 1; }
        .announcement-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 6px; }
        .announcement-date { font-size: 12px; color: #999; }
        .pagination-box { text-align: center; margin-top: 28px; }
        .empty-state { text-align: center; padding: 60px 20px; background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; color: #999; }
        @media (max-width: 768px) {
            .announcement-item { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>

    <section class="main-content">
        <div class="container">
            <div class="page-header"><h1>网站公告</h1></div>
            <div class="announcement-list">
                {if $announcement}
                {foreach $announcement as $a}
                <div class="announcement-item">
                    <div class="announcement-info">
                        <div class="announcement-title">{$a.name}</div>
                        <div class="announcement-date">{$a.time|date="Y-m-d H:i",###}</div>
                    </div>
                    <a href="/announcement/{$a.id}" class="layui-btn layui-btn-sm layui-btn-primary">查看详情</a>
                </div>
                {/foreach}
                {else}
                <div class="empty-state"><p>暂无公告</p></div>
                {/if}
            </div>
            <div class="pagination-box">
                {$announcement->render()}
            </div>
        </div>
    </section>

    {include file="layui/index/footer" /}
