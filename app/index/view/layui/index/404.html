<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="{$favicon}"/>
    <meta name="description" content="{$description}">
    <meta name="keywords" content="{$keywords}">
    <title>{$webname} - 404 Not Found</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
        .error-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f7fa; text-align: center; padding: 20px; }
        .error-content h1 { font-size: 120px; font-weight: 700; color: #1E9FFF; line-height: 1; }
        .error-content h3 { font-size: 22px; color: #555; margin: 16px 0; }
        .error-content p { color: #999; font-size: 14px; margin-bottom: 28px; }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="error-content">
            <h1>404</h1>
            <h3>大事不妙啦！</h3>
            <p>你访问的页面好像不小心被程序猿给弄丢了~</p>
            <a href="/" class="layui-btn layui-btn-lg">返回首页</a>
        </div>
    </div>
</body>
</html>
