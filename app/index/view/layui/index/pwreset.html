<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 重置密码</title>
    {include file="layui/index/header" /}
    <style>
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 60px); padding: 60px 20px; background: #f5f7fa; }
        .auth-card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 430px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .auth-card h2 { text-align: center; font-size: 22px; color: #333; margin-bottom: 6px; }
        .auth-card > p { text-align: center; color: #999; font-size: 14px; margin-bottom: 28px; }
        .captcha-row { display: flex; gap: 10px; align-items: flex-start; }
        .captcha-row .layui-input-block { margin-left: 0; flex: 1; }
        .captcha-row img { height: 42px; cursor: pointer; border: 1px solid #e8e8e8; border-radius: 4px; }
        .code-row { display: flex; gap: 10px; }
        .code-row input { flex: 1; }
        .code-row button { white-space: nowrap; }
        .auth-footer { text-align: center; margin-top: 18px; color: #999; font-size: 13px; }
        .auth-footer a { color: #1E9FFF; text-decoration: none; }
    </style>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>重置密码</h2>
            <p>请输入您的邮箱地址重置密码</p>

            <form id="pwresetForm">
                <div class="layui-form-item">
                    <input type="email" name="email" placeholder="请输入注册邮箱" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <div class="captcha-row">
                        <div style="flex:1;">
                            <input type="text" name="captcha" placeholder="验证码" class="layui-input">
                        </div>
                        <img id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="code-row">
                        <input type="text" name="code" placeholder="邮箱验证码" class="layui-input">
                        <button type="button" class="layui-btn" id="sendCode">获取验证码</button>
                    </div>
                </div>
                <div class="layui-form-item">
                    <input type="password" name="password" placeholder="新密码" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <input type="password" name="repassword" placeholder="确认新密码" class="layui-input">
                </div>
                <div class="layui-form-item">
                    <button type="submit" class="layui-btn layui-btn-fluid">重置密码</button>
                </div>
                <div class="auth-footer">
                    <p>想起密码了？ <a href="/login">返回登录</a></p>
                </div>
            </form>
        </div>
    </div>

    {include file="layui/index/footer" /}
    <script>
        var sendCodeBtn = document.getElementById('sendCode');
        var countdown = 0;
        sendCodeBtn.addEventListener('click', function() {
            if (countdown > 0) return;
            var email = document.querySelector('input[name="email"]').value;
            var captcha = document.querySelector('input[name="captcha"]').value;
            if (!email || !captcha) { layer.msg('请填写邮箱和验证码', {icon:2}); return; }
            sendCodeBtn.disabled = true;
            $.ajax({ type:'POST', url:'', data:{ act:'validate', user:email, captcha:captcha }, dataType:'json',
                success:function(data){
                    if(data.code == 1){
                        layer.msg(data.msg, {icon:1});
                        countdown = 60;
                        var timer = setInterval(function(){
                            if(countdown <= 0){ clearInterval(timer); sendCodeBtn.disabled = false; sendCodeBtn.textContent = '获取验证码'; return; }
                            sendCodeBtn.textContent = countdown + '秒后重发'; countdown--;
                        }, 1000);
                    } else {
                        sendCodeBtn.disabled = false;
                        document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                        layer.msg(data.msg, {icon:2});
                    }
                }
            });
        });

        $(function(){
            $('#pwresetForm').on('submit', function(){
                var btn = $("button[type='submit']");
                btn.attr('disabled', true).text('处理中...');
                var data = { act:'submit', user:$("input[name='email']").val(), code:$("input[name='code']").val(),
                    userpassword:$("input[name='password']").val(), usernewpassword:$("input[name='repassword']").val() };
                $.ajax({ type:'POST', url:'', data:data, dataType:'json',
                    success:function(res){
                        if(res.code == 1){ layer.msg(res.msg, {icon:1}, function(){ location.href = '/login'; }); }
                        else { btn.attr('disabled', false).text('重置密码'); layer.msg(res.msg, {icon:2}); }
                    }
                });
                return false;
            });
        });
    </script>
