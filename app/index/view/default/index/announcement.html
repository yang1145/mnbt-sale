<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 公告详情</title>
    {include file="default/index/header" /}
    <style>
        .main-content {
            padding: 80px 0 60px;
        }
        
        .page-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #dfe1e6;
        }
        
        .page-header h1 {
            font-size: 20px;
            color: #172b4d;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .page-header .meta {
            font-size: 13px;
            color: #5e6c84;
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            color: #5e6c84;
            border: 1px solid #dfe1e6;
            padding: 8px 16px;
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 20px;
        }
        
        .btn-back:hover {
            border-color: #0052cc;
            color: #0052cc;
        }
        
        .announcement-content {
            background: #ffffff;
            padding: 30px;
            border: 1px solid #dfe1e6;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .content-body {
            font-size: 14px;
            line-height: 1.8;
            color: #172b4d;
        }
        
        .content-body p {
            margin-bottom: 15px;
        }
    </style>

    <section class="main-content">
        <div class="container">
            <a href="/announcements" class="btn-back">
                <i class="fas fa-arrow-left"></i> 返回列表
            </a>
            
            <div class="announcement-content">
                <div class="page-header">
                    <h1>{$announcement.name}</h1>
                    <div class="meta">
                        <i class="far fa-clock"></i> 发布时间：{$announcement.time|date="Y-m-d H:i",###}
                    </div>
                </div>
                
                <div class="content-body">
                    {$announcement.content}
                </div>
            </div>
        </div>
    </section>

    {include file="default/index/footer" /}
