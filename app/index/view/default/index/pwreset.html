<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 重置密码</title>
    {include file="default/index/header" /}
    <style>
        .pwreset-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 60px;
        }
        
        .pwreset-form {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #dfe1e6;
            margin: 0 auto;
        }
        
        .pwreset-form h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
            color: #172b4d;
            font-weight: 600;
        }
        
        .pwreset-form > p {
            text-align: center;
            margin-bottom: 25px;
            color: #5e6c84;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-control {
            background: #ffffff;
            border: 1px solid #dfe1e6;
            color: #172b4d;
            padding: 10px 12px;
            width: 100%;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #0052cc;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 82, 204, 0.2);
        }
        
        .btn-block {
            background: #0052cc;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-block:hover {
            background: #0747a6;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #5e6c84;
            font-size: 13px;
        }
        
        .form-footer a {
            color: #0052cc;
            text-decoration: none;
        }
        
        .captcha-container {
            display: flex;
            gap: 10px;
        }
        
        .captcha-input {
            flex: 1;
        }
        
        .captcha-image {
            width: 120px;
            height: 42px;
            cursor: pointer;
            border: 1px solid #dfe1e6;
        }
        
        .code-container {
            display: flex;
            gap: 10px;
        }
        
        .code-input {
            flex: 1;
        }
        
        .btn-code {
            background: #f4f5f7;
            color: #0052cc;
            border: 1px solid #dfe1e6;
            padding: 0 15px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .btn-code:hover {
            background: #e3f2fd;
        }
        
        .btn-code:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        @media (max-width: 768px) {
            .pwreset-form {
                padding: 30px 20px;
            }
            
            .captcha-container,
            .code-container {
                flex-direction: column;
            }
            
            .captcha-image {
                width: 100%;
            }
        }
    </style>

    <div class="pwreset-wrapper">
        <div class="pwreset-form">
            <h2>重置密码</h2>
            <p>请输入您的邮箱地址重置密码</p>
            
            <form id="pwresetForm">
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="请输入注册邮箱" required>
                </div>
                
                <div class="form-group captcha-container">
                    <div class="captcha-input">
                        <input type="text" class="form-control" name="captcha" placeholder="验证码" required>
                    </div>
                    <img class="captcha-image" id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                </div>
                
                <div class="form-group code-container">
                    <div class="code-input">
                        <input type="text" class="form-control" name="code" placeholder="邮箱验证码" required>
                    </div>
                    <button type="button" class="btn-code" id="sendCode">获取验证码</button>
                </div>
                
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="新密码" required>
                </div>
                
                <div class="form-group">
                    <input type="password" name="repassword" class="form-control" placeholder="确认新密码" required>
                </div>
                
                <button type="submit" class="btn-block">重置密码</button>
                
                <div class="form-footer">
                    <p>想起密码了？ <a href="/login">返回登录</a></p>
                </div>
            </form>
        </div>
    </div>

    {include file="default/index/footer" /}
    
    <script src="/static/assets/js/plugins/bootstrap-notify/bootstrap-notify.min.js"></script>
    <script>
        document.getElementById('sendCode').addEventListener('click', function() {
            var email = document.querySelector('input[name="email"]').value;
            var captcha = document.querySelector('input[name="captcha"]').value;
            
            if(!email || !captcha) {
                One.helpers('notify', {type: 'danger', message: '请填写邮箱和验证码', delay:2000});
                return;
            }
            
            var btn = this;
            btn.disabled = true;
            btn.textContent = '发送中...';
            
            $.ajax({
                type: 'POST',
                url: '',
                data: { act: 'sendcode', email: email, captcha: captcha },
                dataType: 'json',
                success: function(data) {
                    if(data.code == 1) {
                        One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        var count = 60;
                        var timer = setInterval(function() {
                            btn.textContent = count + '秒后重发';
                            count--;
                            if(count < 0) {
                                clearInterval(timer);
                                btn.disabled = false;
                                btn.textContent = '获取验证码';
                            }
                        }, 1000);
                    } else {
                        One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                        document.getElementById('randimg').src='{:captcha_src()}?'+Math.random();
                    }
                }
            });
        });
        
        document.getElementById('pwresetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var form = this;
            var btn = form.querySelector('button[type="submit"]');
            var data = new FormData(form);
            data.append('act', 'reset');
            
            btn.disabled = true;
            btn.textContent = '处理中...';
            
            $.ajax({
                type: 'POST',
                url: '',
                data: data,
                processData: false,
                contentType: false,
                dataType: 'json',
                success: function(res) {
                    if(res.code == 1) {
                        One.helpers('notify', {type: 'success', message: res.msg, delay:2000});
                        setTimeout(function() { location.href = '/login'; }, 1500);
                    } else {
                        One.helpers('notify', {type: 'danger', message: res.msg, delay:2000});
                        btn.disabled = false;
                        btn.textContent = '重置密码';
                    }
                }
            });
        });
    </script>
