    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{$description}">
    <meta name="keywords" content="{$keywords}">
    <link rel="shortcut icon" type="image/x-icon" href="{$favicon}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" id="css-main" href="/static/assets/css/oneui.min.css">
    <link rel="stylesheet" href="/static/assets/css/themes/city.min.css">
    <link rel="stylesheet" href="/static/assets/css/custom-blue-white.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background-color: #f4f5f7;
            color: #172b4d;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: #ffffff;
            border-bottom: 1px solid #dfe1e6;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: 700;
            color: #0052cc;
            text-decoration: none;
        }
        
        .logo i {
            margin-right: 8px;
        }
        
        .nav-links {
            display: flex;
            gap: 25px;
        }
        
        .nav-links a {
            color: #5e6c84;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .nav-links a:hover,
        .nav-links a.active {
            color: #0052cc;
        }
        
        .auth-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-login {
            background: transparent;
            color: #5e6c84;
            border: 1px solid #dfe1e6;
        }
        
        .btn-login:hover {
            border-color: #0052cc;
            color: #0052cc;
        }
        
        .btn-register {
            background: #0052cc;
            color: white;
            border: 1px solid #0052cc;
        }
        
        .btn-register:hover {
            background: #0747a6;
        }
        
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #172b4d;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .menu-toggle {
                display: block;
            }
            
            .nav-active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #ffffff;
                border: 1px solid #dfe1e6;
                padding: 15px;
                gap: 10px;
            }
        }
        
        footer {
            background: #172b4d;
            padding: 40px 0 20px;
            color: #b3bac5;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .footer-col h4 {
            font-size: 14px;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .footer-col ul {
            list-style: none;
        }
        
        .footer-col ul li {
            margin-bottom: 8px;
        }
        
        .footer-col a {
            color: #b3bac5;
            text-decoration: none;
            font-size: 13px;
        }
        
        .footer-col a:hover {
            color: #fff;
        }
        
        .footer-bottom {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #36414d;
            font-size: 12px;
        }
        
        .footer-bottom a {
            color: #b3bac5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo">
                    <i class="fas fa-server"></i>
                    <span>{$webname}</span>
                </a>
                
                <div class="nav-links" id="navLinks">
                    <a href="/" {if $active=='index'}class="active"{/if}>首页</a>
                    <a href="/cart" {if $active=='cart'}class="active"{/if}>产品</a>
                    <a href="/announcements" {if $active=='announcements'}class="active"{/if}>公告</a>
                    <a href="#" {if $active=='help'}class="active"{/if}>帮助</a>
                </div>
                
                <div class="auth-buttons">
                    {if $userstate=="1"}
                    <a href="/user/index" class="btn btn-login">用户中心</a>
                    {else}
                    <a href="/login" class="btn btn-login">登录</a>
                    <a href="/register" class="btn btn-register">注册</a>
                    {/if}
                </div>
                
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </nav>
        </div>
    </header>
