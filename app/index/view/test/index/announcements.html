<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 公告列表</title>
    {include file="default/index/header" /}
    <style>
        .main-content {
            padding: 80px 0 60px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-header h1 {
            font-size: 24px;
            color: #172b4d;
            font-weight: 600;
        }
        
        .announcement-list {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .announcement-item {
            background: #ffffff;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #dfe1e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        
        .announcement-item:hover {
            border-color: #0052cc;
        }
        
        .announcement-info {
            flex: 1;
        }
        
        .announcement-title {
            font-size: 15px;
            font-weight: 500;
            color: #172b4d;
            margin-bottom: 8px;
        }
        
        .announcement-date {
            font-size: 12px;
            color: #5e6c84;
        }
        
        .announcement-link {
            color: #0052cc;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border: 1px solid #0052cc;
            transition: background-color 0.2s, color 0.2s;
        }
        
        .announcement-link:hover {
            background: #0052cc;
            color: #fff;
        }
        
        .pagination {
            text-align: center;
            margin-top: 30px;
        }
        
        .no-announcements {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            border: 1px solid #dfe1e6;
            color: #5e6c84;
        }
        
        @media (max-width: 768px) {
            .announcement-item {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>

    <section class="main-content">
        <div class="container">
            <div class="page-header">
                <h1>网站公告</h1>
            </div>
            
            <div class="announcement-list">
                {if $announcement}
                {foreach $announcement as $a}
                <div class="announcement-item">
                    <div class="announcement-info">
                        <div class="announcement-title">{$a.name}</div>
                        <div class="announcement-date">{$a.time|date="Y-m-d H:i",###}</div>
                    </div>
                    <a href="/announcement/{$a.id}" class="announcement-link">查看详情</a>
                </div>
                {/foreach}
                {else}
                <div class="no-announcements">
                    <p>暂无公告</p>
                </div>
                {/if}
            </div>
            
            <div class="pagination">
                {$announcement->render()}
            </div>
        </div>
    </section>

    {include file="default/index/footer" /}
