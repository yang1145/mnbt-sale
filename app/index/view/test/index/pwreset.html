<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>{$webname} - 重置密码</title>
        <meta name="description" content="{$description}">
        <meta name="keywords" content="{$keywords}">
        <link rel="shortcut icon" type="image/x-icon" href="{$favicon}"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" id="css-main" href="/static/assets/css/oneui.min.css">
        <link rel="stylesheet" href="/static/assets/css/themes/city.min.css">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            
            body {
                background: linear-gradient(135deg, #0f1623 0%, #1c2331 100%);
                color: #f4f6fc;
                line-height: 1.6;
                overflow-x: hidden;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 20px;
            }
            
            /* 导航栏样式 */
            header {
                padding: 20px 0;
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
                background: rgba(15, 22, 35, 0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .logo {
                display: flex;
                align-items: center;
                font-size: 24px;
                font-weight: 700;
                color: #4cc9f0;
            }
            
            .logo i {
                margin-right: 10px;
                color: #4361ee;
            }
            
            .nav-links {
                display: flex;
                gap: 30px;
            }
            
            .nav-links a {
                color: #f4f6fc;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s;
            }
            
            .nav-links a:hover {
                color: #4361ee;
            }
            
            .auth-buttons {
                display: flex;
                gap: 15px;
            }
            
            .btn {
                padding: 10px 20px;
                border-radius: 50px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                text-decoration: none;
                display: inline-block;
            }
            
            .btn-login {
                background: transparent;
                color: #f4f6fc;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
            
            .btn-login:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.3);
            }
            
            .btn-register {
                background: #4361ee;
                color: white;
                border: 1px solid #4361ee;
            }
            
            .btn-register:hover {
                background: #3250d4;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
            }
            
            /* 重置密码表单区域 */
            .pwreset-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 160px 20px 100px;
            }
            
            .pwreset-form {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 15px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                margin: 0 auto;
                animation: slideInFromLeft 0.5s ease-out forwards;
                opacity: 0;
                transform: translateX(-50px);
            }
            
            .pwreset-form h2 {
                text-align: center;
                margin-bottom: 10px;
                font-size: 1.8rem;
                color: #fff;
            }
            
            .pwreset-form p {
                text-align: center;
                margin-bottom: 30px;
                color: #b0b7cb;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-control {
                background: rgba(255, 255, 255, 0.07);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #f4f6fc;
                border-radius: 8px;
                padding: 12px 15px;
                width: 100%;
                transition: all 0.3s ease;
            }
            
            .form-control:focus {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(67, 97, 238, 0.5);
                outline: none;
                box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            }
            
            .btn-block {
                background: linear-gradient(90deg, #4361ee, #4cc9f0);
                color: white;
                border: none;
                padding: 12px;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 8px;
                width: 100%;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .btn-block:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            }
            
            .form-footer {
                text-align: center;
                margin-top: 20px;
                color: #b0b7cb;
            }
            
            .form-footer a {
                color: #4cc9f0;
                text-decoration: none;
                transition: color 0.3s;
            }
            
            .form-footer a:hover {
                color: #4361ee;
                text-decoration: underline;
            }
            
            .captcha-container {
                display: flex;
                gap: 10px;
            }
            
            .captcha-input {
                flex: 1;
            }
            
            .captcha-image {
                width: 120px;
                height: 50px;
                border-radius: 8px;
                cursor: pointer;
            }
            
            .code-container {
                display: flex;
                gap: 10px;
            }
            
            .code-input {
                flex: 1;
            }
            
            .btn-code {
                background: rgba(255, 255, 255, 0.07);
                color: #f4f6fc;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                padding: 0 15px;
                cursor: pointer;
                transition: all 0.3s ease;
                white-space: nowrap;
            }
            
            .btn-code:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(67, 97, 238, 0.5);
            }
            
            .btn-code:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            
            footer {
                text-align: center;
                padding: 20px 0;
                color: #b0b7cb;
                font-size: 0.9rem;
            }
            
            footer a {
                color: #4cc9f0;
                text-decoration: none;
            }
            
            footer a:hover {
                text-decoration: underline;
            }
            
            @keyframes slideInFromLeft {
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            
            @media (max-width: 768px) {
                .pwreset-form {
                    padding: 30px 20px;
                }
                
                .captcha-container,
                .code-container {
                    flex-direction: column;
                }
                
                .captcha-image {
                    width: 100%;
                }
            }
            
            /* 移动菜单按钮 */
            .menu-toggle {
                display: none;
                background: none;
                border: none;
                color: white;
                font-size: 1.5rem;
                cursor: pointer;
            }
            
            @media (max-width: 768px) {
                .menu-toggle {
                    display: block;
                }
                
                .nav-active {
                    display: flex;
                    flex-direction: column;
                    position: absolute;
                    top: 100%;
                    left: 0;
                    width: 100%;
                    background: #0f1623;
                    padding: 20px;
                    gap: 15px;
                }
            }
        </style>
    </head>
    <body>
        <!-- 导航栏 -->
        <header>
            <div class="container">
                <nav>
                    <div class="logo">
                        <i class="fas fa-server"></i>
                        <span>{$webname}</span>
                    </div>
                    
                    <div class="nav-links" id="navLinks">
                        <a href="#">首页</a>
                        <a href="#">产品</a>
                        <a href="#">数据中心</a>
                        <a href="#">关于我们</a>
                        <a href="#">技术支持</a>
                        <a href="#">联系我们</a>
                    </div>
                    
                    <div class="auth-buttons">
                        {if $userstate=="1"}
                        <a href="/user/index" class="btn btn-login">用户中心</a>
                        {else}
                        <a href="/login" class="btn btn-login">登录</a>
                        <a href="/register" class="btn btn-register">注册</a>
                        {/if}
                    </div>
                    
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </nav>
            </div>
        </header>

        <main>
            <div class="pwreset-wrapper">
                <div class="pwreset-form">
                    <h2>重置密码</h2>
                    <p>已重置密码？<a href="/login">点击这里登录</a></p>
                    
                    <form class="js-validation-signin">
                        <div class="form-group">
                            <input type="text" class="form-control" name="userName" placeholder="账号或邮箱" autocomplete="off">
                        </div>
                        
                        <div class="form-group captcha-container">
                            <div class="captcha-input">
                                <input type="text" class="form-control" name="captcha" placeholder="验证码">
                            </div>
                            <img class="captcha-image" id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                        </div>
                        
                        <div class="form-group code-container">
                            <div class="code-input">
                                <input type="text" class="form-control" id="code" name="code" placeholder="请输入邮箱验证码">
                            </div>
                            <button class="btn-code" type="button" id="getCodeBtn">获取验证码</button>
                        </div>
                        
                        <div class="form-group">
                            <input type="password" class="form-control" name="userPassword" placeholder="输入新密码">
                        </div>
                        
                        <div class="form-group">
                            <input type="password" class="form-control" name="userNewpassword" placeholder="再次输入新密码">
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="btn-block">重置密码</button>
                        </div>
                    </form>
                    
                    <div class="form-footer">
                        <p>需要帮助？<a href="/support">联系客服</a></p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="container">
                <p><strong><a href="/">{$webname}</a></strong> &copy; <span id="currentYear"></span></p>
                <p><a href="//beian.miit.gov.cn/">{$templateset['网站备案号']}</a></p>
            </div>
        </footer>

        <script>
            // 设置当前年份
            document.getElementById('currentYear').textContent = new Date().getFullYear();
            
            // 移动菜单切换
            document.getElementById('menuToggle').addEventListener('click', function() {
                const navLinks = document.getElementById('navLinks');
                navLinks.classList.toggle('nav-active');
            });
            
            // 获取验证码按钮功能
            document.getElementById('getCodeBtn').addEventListener('click', function() {
                const btn = this;
                const userName = document.querySelector('input[name="userName"]').value;
                
                if (!userName) {
                    alert('请输入账号或邮箱');
                    return;
                }
                
                // 禁用按钮并显示倒计时
                btn.disabled = true;
                let countdown = 60;
                btn.textContent = `${countdown}秒后重试`;
                
                const timer = setInterval(() => {
                    countdown--;
                    btn.textContent = `${countdown}秒后重试`;
                    
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = '获取验证码';
                    }
                }, 1000);
                
                // 这里应该调用获取验证码的接口
                // validate(); // 原始代码中的函数
            });
            
            // 表单提交处理
            document.querySelector('form').addEventListener('submit', function(e) {
                e.preventDefault();
                // 这里应该添加表单提交逻辑
                alert('密码重置功能需要后端接口支持');
            });
        </script>
    </body>
</html>
