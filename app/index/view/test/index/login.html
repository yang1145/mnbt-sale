<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 登录</title>
    {include file="default/index/header" /}
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 60px;
        }
        
        .login-form {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #dfe1e6;
            margin: 0 auto;
        }
        
        .login-form h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
            color: #172b4d;
            font-weight: 600;
        }
        
        .login-form > p {
            text-align: center;
            margin-bottom: 25px;
            color: #5e6c84;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-control {
            background: #ffffff;
            border: 1px solid #dfe1e6;
            color: #172b4d;
            padding: 10px 12px;
            width: 100%;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #0052cc;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 82, 204, 0.2);
        }
        
        .btn-block {
            background: #0052cc;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-block:hover {
            background: #0747a6;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #5e6c84;
            font-size: 13px;
        }
        
        .form-footer a {
            color: #0052cc;
            text-decoration: none;
        }
        
        .nav-tabs-custom {
            display: flex;
            margin-bottom: 20px;
        }
        
        .nav-tabs-custom .nav-link {
            flex: 1;
            text-align: center;
            padding: 10px;
            color: #5e6c84;
            background: #f4f5f7;
            border: none;
            font-size: 14px;
            text-decoration: none;
        }
        
        .nav-tabs-custom .nav-link.active {
            color: #fff;
            background: #0052cc;
        }
        
        .captcha-row {
            display: flex;
            gap: 10px;
        }
        
        .captcha-row .form-group {
            flex: 1;
        }
        
        .captcha-row img {
            height: 42px;
            cursor: pointer;
            border: 1px solid #dfe1e6;
        }
        
        @media (max-width: 768px) {
            .login-form {
                padding: 30px 20px;
            }
        }
    </style>

    <div class="login-wrapper">
        <div class="login-form">
            <h2>用户登录</h2>
            <p>欢迎回来，请登录您的账户</p>

            <ul class="nav nav-pills nav-tabs-custom nav-justified" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active" data-toggle="tab" href="#mmdl" role="tab" aria-selected="true">
                        密码登录
                    </a>
                </li>
            </ul>
            
            <div class="tab-content text-muted">
                <div id="mmdl" class="tab-pane active" role="tabpanel">
                    <form id="form1" class="js-validation-signin">
                        <div class="form-group">
                            <input type="text" class="form-control" name="userName" placeholder="账号或者邮箱" autocomplete="off">
                        </div>
                        
                        <div class="form-group">
                            <input type="password" class="form-control" name="userPwd" placeholder="密码">
                        </div>

                        <div class="captcha-row">
                            <div class="form-group">
                                <input type="text" class="form-control" name="captcha" placeholder="验证码">
                            </div>
                            <img id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                        </div>
                        
                        <button type="submit" class="btn-block">
                            <i class="fa fa-fw fa-sign-in-alt mr-1"></i> 登录
                        </button>
                        
                        <div class="form-footer">
                            <p>没有账户？ <a href="/register">立即注册</a> | 忘记密码？<a href="/pwreset">点击这里</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {include file="default/index/footer" /}
    
    <script src="/static/assets/js/plugins/bootstrap-notify/bootstrap-notify.min.js"></script>
    <script>
        $("#form1").submit(function (){
            var login = $("button[type='submit']");
            var userName = $("input[name='userName']").val();
            var userPwd = $("input[name='userPwd']").val();
            var userCaptcha = $("input[name='captcha']").val();

            if(userName.length < 1 || userPwd.length < 1 || userCaptcha.length < 1){
                One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                return false;
            }

            login.attr('disabled', 'true');
            One.helpers('notify', {type: 'warning', message: '正在登录，请稍后...', delay:2000});

            $.ajax({
                type:'POST',
                url:'',
                data:{
                    act:"ptdl",
                    user:userName,
                    password:userPwd,
                    captcha:userCaptcha,
                },
                dataType:'json',
                success:function (data){
                    if(data.code == 1){
                        setTimeout(function (){
                            location.href = '/user/index'
                        },1000);
                        One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                    }else{
                        document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                        login.removeAttr('disabled');
                        One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                    }
                }
            });
            return false;
        });
    </script>
