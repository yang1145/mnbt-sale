<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>{$webname} - 登录</title>
        <meta name="description" content="{$description}">
        <meta name="keywords" content="{$keywords}">
        <link rel="shortcut icon" type="image/x-icon" href="{$favicon}"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" id="css-main" href="/static/assets/css/oneui.min.css">
        <link rel="stylesheet" href="/static/assets/css/themes/city.min.css">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            
            body {
                background: linear-gradient(135deg, #0f1623 0%, #1c2331 100%);
                color: #f4f6fc;
                line-height: 1.6;
                overflow-x: hidden;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 20px;
            }
            
            /* 导航栏样式 */
            header {
                padding: 20px 0;
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
                background: rgba(15, 22, 35, 0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .logo {
                display: flex;
                align-items: center;
                font-size: 24px;
                font-weight: 700;
                color: #4cc9f0;
            }
            
            .logo i {
                margin-right: 10px;
                color: #4361ee;
            }
            
            .nav-links {
                display: flex;
                gap: 30px;
            }
            
            .nav-links a {
                color: #f4f6fc;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s;
            }
            
            .nav-links a:hover {
                color: #4361ee;
            }
            
            .auth-buttons {
                display: flex;
                gap: 15px;
            }
            
            .btn {
                padding: 10px 20px;
                border-radius: 50px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                text-decoration: none;
                display: inline-block;
            }
            
            .btn-login {
                background: transparent;
                color: #f4f6fc;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
            
            .btn-login:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.3);
            }
            
            .btn-register {
                background: #4361ee;
                color: white;
                border: 1px solid #4361ee;
            }
            
            .btn-register:hover {
                background: #3250d4;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
            }
            
            /* 登录表单区域 */
            .login-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 160px 20px 100px;
            }
            
            .login-form {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 15px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                margin: 0 auto;
                animation: slideInFromLeft 0.5s ease-out forwards;
                opacity: 0;
                transform: translateX(-50px);
            }
            
            .login-form h2 {
                text-align: center;
                margin-bottom: 10px;
                font-size: 1.8rem;
                color: #fff;
            }
            
            .login-form p {
                text-align: center;
                margin-bottom: 30px;
                color: #b0b7cb;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-control {
                background: rgba(255, 255, 255, 0.07);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #f4f6fc;
                border-radius: 8px;
                padding: 12px 15px;
                width: 100%;
                transition: all 0.3s ease;
            }
            
            .form-control:focus {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(67, 97, 238, 0.5);
                outline: none;
                box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            }
            
            .btn-block {
                background: linear-gradient(90deg, #4361ee, #4cc9f0);
                color: white;
                border: none;
                padding: 12px;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 8px;
                width: 100%;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .btn-block:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            }
            
            .form-footer {
                text-align: center;
                margin-top: 20px;
                color: #b0b7cb;
            }
            
            .form-footer a {
                color: #4cc9f0;
                text-decoration: none;
                transition: color 0.3s;
            }
            
            .form-footer a:hover {
                color: #4361ee;
                text-decoration: underline;
            }
            
            .nav-tabs-custom .nav-link {
                color: #b0b7cb;
                border: none;
                border-radius: 8px;
                margin-right: 5px;
                background: rgba(255, 255, 255, 0.05);
            }
            
            .nav-tabs-custom .nav-link.active {
                color: #fff;
                background: rgba(67, 97, 238, 0.3);
            }
            
            .input-group-append .btn {
                border-radius: 0 8px 8px 0;
                height: 100%;
            }
            
            /* 邮箱验证码输入框和按钮样式修复 */
            .verify-code-group {
                display: flex;
                gap: 10px;
            }
            
            .verify-code-input {
                flex: 1;
                min-width: 0;
            }
            
            .verify-code-btn {
                flex: 0 0 auto;
                padding: 12px 15px;
                border-radius: 8px;
                height: auto;
                line-height: 1;
                white-space: nowrap;
            }
            
            .verify-code-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
            
            /* 页脚 */
            footer {
                text-align: center;
                padding: 30px 0;
                color: #b0b7cb;
                font-size: 0.9rem;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                margin-top: 50px;
            }
            
            footer a {
                color: #4cc9f0;
                text-decoration: none;
            }
            
            footer a:hover {
                text-decoration: underline;
            }
            
            @keyframes slideInFromLeft {
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            
            @media (max-width: 768px) {
                .nav-links {
                    display: none;
                }
                
                .login-form {
                    padding: 30px 20px;
                }
            }
        </style>
    </head>    
    <body>
        <!-- 导航栏 -->
        <header>
            <div class="container">
                <nav>
                    <div class="logo">
                        <i class="fas fa-server"></i>
                        <span>{$webname}</span>
                    </div>
                    
                    <div class="nav-links" id="navLinks">
                        <a href="/">首页</a>
                        <a href="#">产品</a>
                        <a href="#">数据中心</a>
                        <a href="#">关于我们</a>
                        <a href="#">技术支持</a>
                        <a href="#">联系我们</a>
                    </div>
                    
                    <div class="auth-buttons">
                        {if $userstate=="1"}
                        <a href="/user/index" class="btn btn-login">用户中心</a>
                        {else}
                        <a href="/login" class="btn btn-login">登录</a>
                        <a href="/register" class="btn btn-register">注册</a>
                        {/if}
                    </div>
                </nav>
            </div>
        </header>

        <div class="login-wrapper">
            <div class="login-form">
                <h2>用户登录</h2>
                <p>欢迎回来，请登录您的账户</p>
                <p>忘记密码？<a href="/pwreset">点击这里</a></p>

                <ul class="nav nav-pills nav-tabs-custom nav-justified" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active" data-toggle="tab" href="#mmdl" role="tab" aria-selected="true">
                            密码登录
                        </a>
                    </li>
                </ul>
                
                <div class="tab-content text-muted">
                    <div id="mmdl" class="tab-pane active" role="tabpanel">
                        <form id="form1" class="js-validation-signin">
                            <div class="py-3">
                                <div class="form-group">
                                    <input type="text" class="form-control form-control-alt form-control-lg font-size-sm" name="userName" placeholder="账号或者邮箱" autocomplete="off">
                                </div>
                                
                                <div class="form-group">
                                    <input type="password" class="form-control form-control-alt form-control-lg font-size-sm" name="userPwd" placeholder="密码">
                                </div>

                                <div class="form-group row">
                                    <div class="col-6">
                                        <input type="text" class="form-control form-control-alt form-control-lg font-size-sm" name="captcha" placeholder="验证码">
                                    </div>
                                    <div class="col-6">
                                        <img width="100%" height="50px" id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group row">
                                <div class="col-md-12 col-xl-12">
                                    <button type="submit" class="btn-block">
                                        <i class="fa fa-fw fa-sign-in-alt mr-1"></i> 登录
                                    </button>
                                </div>
                            </div>
                            <div class="form-footer">
                                <p>没有账户？ <a href="/register">立即注册</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <footer>
            <div class="container">
                <div class="copyright">
                    <p>© <span data-toggle="year-copy">2024</span> {$webname}。保留所有权利。<a href="//beian.miit.gov.cn/">{$templateset['网站备案号']}</a></p>
                </div>
            </div>
        </footer>

        <script src="/static/assets/js/oneui.core.min.js"></script>
        <script src="/static/assets/js/oneui.app.min.js"></script>
        <script src="/static/assets/js/plugins/bootstrap-notify/bootstrap-notify.min.js"></script>
        <script>
            // 添加动画类
            document.querySelector('.login-form').style.animation = 'slideInFromLeft 0.5s ease-out forwards';
            document.querySelector('.login-form').style.opacity = '0';
            document.querySelector('.login-form').style.transform = 'translateX(-50px)';
            
            // 移动菜单切换
            document.getElementById('menuToggle').addEventListener('click', function() {
                const navLinks = document.getElementById('navLinks');
                navLinks.classList.toggle('nav-active');
            });
            
            {if $yxdl=="1"}
            function validate() {
                var mail = $("input[name='mail']").val();
                var captcha = $("input[name='1captcha']").val();

                if(mail.length < 1 || captcha.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请确保邮箱和验证码不为空', delay:2000});
                    return false;
                }

                // 禁用按钮并添加倒计时效果
                var validateBtn = document.querySelector('.validate-btn');
                validateBtn.disabled = true;
                var originalText = validateBtn.textContent;
                validateBtn.textContent = '发送中...';

                One.helpers('notify', {type: 'warning', message: '正在获取验证码，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        mail:mail,
                        act:"yxvalidate",
                        captcha:captcha,
                    },
                    dataType:'json',           
                    success:function (data){
                        if(data.code == 1){
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                            // 添加倒计时功能
                            startCountdown(validateBtn, 60);
                        }else{
                            document.getElementById("1randimg").src='/captcha.html?'+Math.random();
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                            validateBtn.disabled = false;
                            validateBtn.textContent = originalText;
                        }
                    },
                    error: function() {
                        One.helpers('notify', {type: 'danger', message: '网络错误，请稍后重试', delay:2000});
                        validateBtn.disabled = false;
                        validateBtn.textContent = originalText;
                    }
                });
                return false;
            }
            
            // 倒计时功能
            function startCountdown(button, seconds) {
                var count = seconds;
                button.textContent = count + '秒后重发';
                
                var timer = setInterval(function() {
                    count--;
                    button.textContent = count + '秒后重发';
                    
                    if (count <= 0) {
                        clearInterval(timer);
                        button.disabled = false;
                        button.textContent = '获取验证码';
                    }
                }, 1000);
            }
            {/if}

            $("#form2").submit(function (){
                var login = $("button[type='submit']");
                var mail = $("input[name='mail']").val();
                var code = $("input[name='code']").val();

                if(mail.length < 1 || code.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请你确保必填项不为空', delay:2000});
                    return false;
                }

                login.attr('disabled', 'true');
                One.helpers('notify', {type: 'warning', message: '正在登录，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        act:"yxdl",
                        mail:mail,
                        code:code,
                    },
                    dataType:'json',
                    success:function (data){
                        if(data.code == 1){
                            setTimeout(function (){
                                location.href = '/user/index'
                            },1000);
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        }else{
                            document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                            login.removeAttr('disabled');
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        }
                    }
                });       
                return false;
            });
            
            $("#form1").submit(function (){
                var login = $("button[type='submit']");
                var userName = $("input[name='userName']").val();
                var userPwd = $("input[name='userPwd']").val();
                var userCaptcha = $("input[name='captcha']").val();

                if(userName.length < 1 || userPwd.length < 1 || userCaptcha.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                    return false;
                }

                login.attr('disabled', 'true');
                One.helpers('notify', {type: 'warning', message: '正在登录，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        act:"ptdl",
                        user:userName,
                        password:userPwd,
                        captcha:userCaptcha,
                    },
                    dataType:'json',
                    success:function (data){
                        if(data.code == 1){
                            setTimeout(function (){
                                location.href = '/user/index'
                            },1000);
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        }else{
                            document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                            login.removeAttr('disabled');
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        }
                    }
                });
                return false;
            });
            
            // 为获取邮箱验证码按钮添加事件监听器
            {if $yxdl=="1"}
            document.addEventListener('DOMContentLoaded', function() {
                var validateBtn = document.querySelector('.validate-btn');
                if (validateBtn) {
                    validateBtn.addEventListener('click', validate);
                }
            });
            {/if}
        </script>
    </body>
</html>
