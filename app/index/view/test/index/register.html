<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>{$webname} - 注册</title>
    {include file="default/index/header" /}
    <style>
        .register-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 60px;
        }
        
        .register-form {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #dfe1e6;
            margin: 0 auto;
        }
        
        .register-form h2 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 20px;
            color: #172b4d;
            font-weight: 600;
        }
        
        .register-form > p {
            text-align: center;
            margin-bottom: 25px;
            color: #5e6c84;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-control {
            background: #ffffff;
            border: 1px solid #dfe1e6;
            color: #172b4d;
            padding: 10px 12px;
            width: 100%;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #0052cc;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 82, 204, 0.2);
        }
        
        .btn-block {
            background: #0052cc;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .btn-block:hover {
            background: #0747a6;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #5e6c84;
            font-size: 13px;
        }
        
        .form-footer a {
            color: #0052cc;
            text-decoration: none;
        }
        
        .captcha-container {
            display: flex;
            gap: 10px;
        }
        
        .captcha-input {
            flex: 1;
        }
        
        .captcha-image {
            width: 120px;
            height: 42px;
            cursor: pointer;
            border: 1px solid #dfe1e6;
        }
        
        .code-input {
            display: flex;
            gap: 10px;
        }
        
        .code-input input {
            flex: 1;
        }
        
        .code-input button {
            background: #f4f5f7;
            color: #0052cc;
            border: 1px solid #dfe1e6;
            padding: 0 15px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .code-input button:hover {
            background: #e3f2fd;
        }
        
        @media (max-width: 768px) {
            .register-form {
                padding: 30px 20px;
            }
            
            .captcha-container {
                flex-direction: column;
            }
            
            .captcha-image {
                width: 100%;
            }
        }
    </style>

    <div class="register-wrapper">
        <div class="register-form">
            <h2>用户注册</h2>
            <p>欢迎您的加入！</p>
            <form>
                <div class="form-group">
                    <input type="text" name="userName" class="form-control" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <input type="text" name="userUser" class="form-control" placeholder="请输入账号">
                </div>
                <div class="form-group">
                    <input type="password" name="userPwd" class="form-control" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <input type="password" name="userRepwd" class="form-control" placeholder="再次输入密码">
                </div>
                <div class="form-group">
                    <input type="text" name="userQq" class="form-control" placeholder="请输入QQ">
                </div>
                
                {if $zcyxyz=="1"}                                               
                <div class="form-group">
                    <input type="email" name="userMail" class="form-control" placeholder="请输入邮箱">
                </div>
                {/if}
                
                <div class="form-group captcha-container">
                    <div class="captcha-input">
                        <input type="text" class="form-control" name="captcha" placeholder="验证码">
                    </div>
                    <img class="captcha-image" id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                </div>
                
                {if $zcyxyz=="1"}                                               
                <div class="form-group">
                    <div class="code-input">
                        <input type="text" class="form-control" id="code" name="code" placeholder="请输入邮箱验证码">
                        <button type="button" onclick="validate()">获取验证码</button>
                    </div>
                </div>
                {/if}
                
                <div class="form-group">
                    <button type="submit" class="btn-block">
                        <i class="fa fa-fw fa-plus mr-1"></i> 注册
                    </button>
                </div>
                
                <div class="form-footer">
                    <p>已有账户？ <a href="/login">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>

    {include file="default/index/footer" /}
    
    <script src="/static/assets/js/plugins/bootstrap-notify/bootstrap-notify.min.js"></script>
    <script>
        {if $zcyxyz=="1"}                  
        function validate() {
            var userMail = $("input[name='userMail']").val();
            var userCaptcha = $("input[name='captcha']").val();

            if(userMail.length < 1 || userCaptcha.length < 1){
                One.helpers('notify', {type: 'danger', message: '请确保邮箱和验证码不为空', delay:2000});
                return false;
            }

            One.helpers('notify', {type: 'warning', message: '正在获取验证码，请稍后...', delay:2000});

            $.ajax({
                type:'POST',
                url:'',
                data:{
                    mail:userMail,
                    act:"yxvalidate",
                    captcha:userCaptcha,
                },
                dataType:'json',           
                success:function (data){
                    if(data.code == 1){
                        One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                    }else{
                        document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                        One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                    }
                }
            });
            return false;
        }
        {/if}
        
        {if $zcyxyz=="1"}                  
        $("form").submit(function (){
            var login = $("button[type='submit']");
            var userName = $("input[name='userName']").val(); 
            var userUser = $("input[name='userUser']").val();
            var userPwd = $("input[name='userPwd']").val();
            var userRepwd = $("input[name='userRepwd']").val();
            var userMail = $("input[name='userMail']").val();
            var userQq = $("input[name='userQq']").val();
            var userCode = $("input[name='code']").val();

            if(userName.length < 1 || userUser.length < 1 || userPwd.length < 1 || userRepwd.length < 1 || userMail.length < 1 || userQq.length < 1 || userCode.length < 1){
                One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                return false;
            }

            login.attr('disabled', 'true');
            One.helpers('notify', {type: 'warning', message: '正在注册，请稍后...', delay:2000});

            $.ajax({
                type:'POST',
                url:'',
                data:{
                    name:userName,
                    user:userUser,
                    password:userPwd,
                    repassword:userRepwd,
                    mail:userMail,
                    qq:userQq,
                    code:userCode,
                    act:"yxzc",
                },
                dataType:'json',
                success:function (data){
                    if(data.code == 1){
                        setTimeout(function (){
                            location.href = '/login'
                        },1000);
                        One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                    }else{
                        document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                        login.removeAttr('disabled');
                        One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                    }
                }
            });
            return false;
        });
                       
        {else}              
        $("form").submit(function (){
            var login = $("button[type='submit']");
            var userName = $("input[name='userName']").val(); 
            var userUser = $("input[name='userUser']").val();
            var userPwd = $("input[name='userPwd']").val();
            var userRepwd = $("input[name='userRepwd']").val();
            var userQq = $("input[name='userQq']").val();
            var userCaptcha = $("input[name='captcha']").val();

            if(userName.length < 1 || userUser.length < 1 || userPwd.length < 1 || userRepwd.length < 1 || userQq.length < 1 || userCaptcha.length < 1){
                One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                return false;
            }

            login.attr('disabled', 'true');
            One.helpers('notify', {type: 'warning', message: '正在注册，请稍后...', delay:2000});

            $.ajax({
                type:'POST',
                url:'',
                data:{
                    name:userName,
                    user:userUser,
                    password:userPwd,
                    repassword:userRepwd,
                    qq:userQq,
                    captcha:userCaptcha,
                    act:"ptzc",
                },
                dataType:'json',
                success:function (data){
                    if(data.code == 1){
                        setTimeout(function (){
                            location.href = '/login'
                        },1000);
                        One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                    }else{
                        document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                        login.removeAttr('disabled');
                        One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                    }
                }
            });
            return false;
        });
        {/if}
    </script>
