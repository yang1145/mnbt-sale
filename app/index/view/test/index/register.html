<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>{$webname} - 注册</title>
        <meta name="description" content="{$description}">
        <meta name="keywords" content="{$keywords}">
        <link rel="shortcut icon" type="image/x-icon" href="{$favicon}"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" id="css-main" href="/static/assets/css/oneui.min.css">
        <link rel="stylesheet" href="/static/assets/css/themes/city.min.css">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            
            body {
                background: linear-gradient(135deg, #0f1623 0%, #1c2331 100%);
                color: #f4f6fc;
                line-height: 1.6;
                overflow-x: hidden;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 20px;
            }
            
            /* 导航栏样式 */
            header {
                padding: 20px 0;
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
                background: rgba(15, 22, 35, 0.9);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .logo {
                display: flex;
                align-items: center;
                font-size: 24px;
                font-weight: 700;
                color: #4cc9f0;
            }
            
            .logo i {
                margin-right: 10px;
                color: #4361ee;
            }
            
            .nav-links {
                display: flex;
                gap: 30px;
            }
            
            .nav-links a {
                color: #f4f6fc;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s;
            }
            
            .nav-links a:hover {
                color: #4361ee;
            }
            
            .auth-buttons {
                display: flex;
                gap: 15px;
            }
            
            .btn {
                padding: 10px 20px;
                border-radius: 50px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                text-decoration: none;
                display: inline-block;
            }
            
            .btn-login {
                background: transparent;
                color: #f4f6fc;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
            
            .btn-login:hover {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(255, 255, 255, 0.3);
            }
            
            .btn-register {
                background: #4361ee;
                color: white;
                border: 1px solid #4361ee;
            }
            
            .btn-register:hover {
                background: #3250d4;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
            }
            
            /* 注册表单区域 */
            .register-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 160px 20px 100px;
            }
            
            .register-form {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 15px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                margin: 0 auto;
                animation: slideInFromLeft 0.5s ease-out forwards;
                opacity: 0;
                transform: translateX(-50px);
            }
            
            .register-form h2 {
                text-align: center;
                margin-bottom: 10px;
                font-size: 1.8rem;
                color: #fff;
            }
            
            .register-form p {
                text-align: center;
                margin-bottom: 30px;
                color: #b0b7cb;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-control {
                background: rgba(255, 255, 255, 0.07);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: #f4f6fc;
                border-radius: 8px;
                padding: 12px 15px;
                width: 100%;
                transition: all 0.3s ease;
            }
            
            .form-control:focus {
                background: rgba(255, 255, 255, 0.1);
                border-color: rgba(67, 97, 238, 0.5);
                outline: none;
                box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            }
            
            .btn-block {
                background: linear-gradient(90deg, #4361ee, #4cc9f0);
                color: white;
                border: none;
                padding: 12px;
                font-size: 1rem;
                font-weight: 600;
                border-radius: 8px;
                width: 100%;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            
            .btn-block:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            }
            
            .form-footer {
                text-align: center;
                margin-top: 20px;
                color: #b0b7cb;
            }
            
            .form-footer a {
                color: #4cc9f0;
                text-decoration: none;
            }
            
            .form-footer a:hover {
                text-decoration: underline;
            }
            
            .captcha-container {
                display: flex;
                gap: 15px;
            }
            
            .captcha-input {
                flex: 1;
            }
            
            .captcha-image {
                width: 150px;
                border-radius: 8px;
                cursor: pointer;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .code-input {
                display: flex;
            }
            
            .code-input input {
                flex: 1;
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
            }
            
            .code-input button {
                background: #4361ee;
                color: white;
                border: none;
                padding: 0 15px;
                border-top-right-radius: 8px;
                border-bottom-right-radius: 8px;
                cursor: pointer;
                transition: background 0.3s;
            }
            
            .code-input button:hover {
                background: #3250d4;
            }
            
            /* 页脚样式 */
            footer {
                background: #0a0f19;
                padding: 40px 0 20px;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                margin-top: 50px;
            }
            
            .copyright {
                text-align: center;
                padding-top: 20px;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                color: #8a91a8;
                font-size: 0.9rem;
            }
            
            /* 响应式设计 */
            @media (max-width: 768px) {
                .nav-links {
                    display: none;
                }
                
                .register-form {
                    padding: 30px 20px;
                    margin: 0 15px;
                }
                
                .captcha-container {
                    flex-direction: column;
                }
                
                .captcha-image {
                    width: 100%;
                }
                
                .register-wrapper {
                    padding: 160px 10px 100px;
                }
            }
            
            .menu-toggle {
                display: none;
                background: none;
                border: none;
                color: white;
                font-size: 1.5rem;
                cursor: pointer;
            }
            
            @media (max-width: 768px) {
                .menu-toggle {
                    display: block;
                }
                
                .nav-active {
                    display: flex;
                    flex-direction: column;
                    position: absolute;
                    top: 100%;
                    left: 0;
                    width: 100%;
                    background: #0f1623;
                    padding: 20px;
                    gap: 15px;
                }
            }
            
            /* 添加动画关键帧 */
            @keyframes slideInFromLeft {
                0% {
                    opacity: 0;
                    transform: translateX(-50px);
                }
                100% {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
        </style>
    </head>  
    <body>
        <!-- 导航栏 -->
        <header>
            <div class="container">
                <nav>
                    <div class="logo">
                        <i class="fas fa-server"></i>
                        <span>{$webname}</span>
                    </div>
                    
                    <div class="nav-links" id="navLinks">
                        <a href="/">首页</a>
                        <a href="#">产品</a>
                        <a href="#">数据中心</a>
                        <a href="#">关于我们</a>
                        <a href="#">技术支持</a>
                        <a href="#">联系我们</a>
                    </div>
                    
                    <div class="auth-buttons">
                        <a href="/login" class="btn btn-login">登录</a>
                        <a href="/register" class="btn btn-register">注册</a>
                    </div>
                    
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </nav>
            </div>
        </header>

        <!-- 注册表单 -->
        <div class="register-wrapper">
            <div class="register-form">
                <h2>用户注册</h2>
                <p>欢迎您的加入！</p>
                <form>
                    <div class="form-group">
                        <input type="text" name="userName" class="form-control" placeholder="请输入昵称">
                    </div>
                    <div class="form-group">
                        <input type="text" name="userUser" class="form-control" placeholder="请输入账号">
                    </div>
                    <div class="form-group">
                        <input type="password" name="userPwd" class="form-control" placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <input type="password" name="userRepwd" class="form-control" placeholder="再次输入密码">
                    </div>
                    <div class="form-group">
                        <input type="text" name="userQq" class="form-control" placeholder="请输入QQ">
                    </div>
                    
                    {if $zcyxyz=="1"}                                               
                    <div class="form-group">
                        <input type="email" name="userMail" class="form-control" placeholder="请输入邮箱">
                    </div>
                    {/if}
                    
                    <div class="form-group captcha-container">
                        <div class="captcha-input">
                            <input type="text" class="form-control" name="captcha" placeholder="验证码">
                        </div>
                        <img class="captcha-image" id="randimg" src="{:captcha_src()}" onclick="this.src='{:captcha_src()}?'+Math.random();"/>
                    </div>
                    
                    {if $zcyxyz=="1"}                                               
                    <div class="form-group">
                        <div class="code-input">
                            <input type="text" class="form-control" id="code" name="code" placeholder="请输入邮箱验证码">
                            <button type="button" onclick="validate()">获取验证码</button>
                        </div>
                    </div>
                    {/if}
                    
                    <div class="form-group">
                        <button type="submit" class="btn-block">
                            <i class="fa fa-fw fa-plus mr-1"></i> 注册
                        </button>
                    </div>
                    
                    <div class="form-footer">
                        <p>已有账户？ <a href="/login">立即登录</a></p>
                    </div>
                </form>
            </div>
        </div>

        <!-- 页脚 -->
        <footer>
            <div class="container">
                <div class="copyright">
                    <p>© <span data-toggle="year-copy">2024</span> {$webname}。保留所有权利。 <a href="//beian.miit.gov.cn/">{$templateset['网站备案号']}</a></p>
                    <a href="//beian.miit.gov.cn/">{$templateset['网站备案号']}</a>
                </div>
            </div>
        </footer>

        <script src="/static/assets/js/oneui.core.min.js"></script>
        <script src="/static/assets/js/oneui.app.min.js"></script>
        <script src="/static/assets/js/plugins/bootstrap-notify/bootstrap-notify.min.js"></script>
        <script>
            // 移动菜单切换
            document.getElementById('menuToggle').addEventListener('click', function() {
                const navLinks = document.getElementById('navLinks');
                navLinks.classList.toggle('nav-active');
            });
            
            // 移除旧的动画类添加代码
            // 添加动画类
            // document.querySelectorAll('.register-form').forEach(block => {
            //     block.classList.add('animated', 'rotateInDownLeft');
            // });
            
            {if $zcyxyz=="1"}                  
            function validate() {
                var userMail = $("input[name='userMail']").val();
                var userCaptcha = $("input[name='captcha']").val();

                if(userMail.length < 1 || userCaptcha.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请确保邮箱和验证码不为空', delay:2000});
                    return false;
                }

                One.helpers('notify', {type: 'warning', message: '正在获取验证码，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        mail:userMail,
                        act:"yxvalidate",
                        captcha:userCaptcha,
                    },
                    dataType:'json',           
                    success:function (data){
                        if(data.code == 1){
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        }else{
                            document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        }
                    }
                });
                return false;
            }
            {/if}
            
            {if $zcyxyz=="1"}                  
            $("form").submit(function (){
                var login = $("button[type='submit']");
                var userName = $("input[name='userName']").val(); 
                var userUser = $("input[name='userUser']").val();
                var userPwd = $("input[name='userPwd']").val();
                var userRepwd = $("input[name='userRepwd']").val();
                var userMail = $("input[name='userMail']").val();
                var userQq = $("input[name='userQq']").val();
                var userCode = $("input[name='code']").val();

                if(userName.length < 1 || userUser.length < 1 || userPwd.length < 1 || userRepwd.length < 1 || userMail.length < 1 || userQq.length < 1 || userCode.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                    return false;
                }

                login.attr('disabled', 'true');
                One.helpers('notify', {type: 'warning', message: '正在注册，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        name:userName,
                        user:userUser,
                        password:userPwd,
                        repassword:userRepwd,
                        mail:userMail,
                        qq:userQq,
                        code:userCode,
                        act:"yxzc",
                    },
                    dataType:'json',
                    success:function (data){
                        if(data.code == 1){
                            setTimeout(function (){
                                location.href = '/login'
                            },1000);
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        }else{
                            document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                            login.removeAttr('disabled');
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        }
                    }
                });
                return false;
            });
                           
            {else}              
            $("form").submit(function (){
                var login = $("button[type='submit']");
                var userName = $("input[name='userName']").val(); 
                var userUser = $("input[name='userUser']").val();
                var userPwd = $("input[name='userPwd']").val();
                var userRepwd = $("input[name='userRepwd']").val();
                var userQq = $("input[name='userQq']").val();
                var userCaptcha = $("input[name='captcha']").val();

                if(userName.length < 1 || userUser.length < 1 || userPwd.length < 1 || userRepwd.length < 1 || userQq.length < 1 || userCaptcha.length < 1){
                    One.helpers('notify', {type: 'danger', message: '请确保必填项不为空', delay:2000});
                    return false;
                }

                login.attr('disabled', 'true');
                One.helpers('notify', {type: 'warning', message: '正在注册，请稍后...', delay:2000});

                $.ajax({
                    type:'POST',
                    url:'',
                    data:{
                        name:userName,
                        user:userUser,
                        password:userPwd,
                        repassword:userRepwd,
                        qq:userQq,
                        captcha:userCaptcha,
                        act:"ptzc",
                    },
                    dataType:'json',
                    success:function (data){
                        if(data.code == 1){
                            setTimeout(function (){
                                location.href = '/login'
                            },1000);
                            One.helpers('notify', {type: 'success', message: data.msg, delay:2000});
                        }else{
                            document.getElementById("randimg").src='{:captcha_src()}?'+Math.random();
                            login.removeAttr('disabled');
                            One.helpers('notify', {type: 'danger', message: data.msg, delay:2000});
                        }
                    }
                });
                return false;
            });
            {/if}
        </script>
    </body>
</html>
