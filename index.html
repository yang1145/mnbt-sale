<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运行目录配置提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f4f5f7;
            color: #172b4d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #dfe1e6;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 8px 24px rgba(23, 43, 77, 0.06);
            text-align: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            background: rgba(0, 82, 204, 0.08);
            color: #0052cc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #172b4d;
        }

        p {
            font-size: 15px;
            color: #5e6c84;
            margin-bottom: 24px;
        }

        .tip-box {
            background: #f4f8ff;
            border: 1px solid #e6edf7;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }

        .tip-box h3 {
            font-size: 14px;
            color: #172b4d;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .tip-box ul {
            list-style: none;
            font-size: 14px;
            color: #5e6c84;
        }

        .tip-box li {
            padding: 6px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .tip-box li::before {
            content: "•";
            color: #0052cc;
            font-weight: 700;
        }

        code {
            display: block;
            background: #172b4d;
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 8px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            word-break: break-all;
            text-align: left;
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #5e6c84;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚙️</div>
        <h1>请设置网站运行目录</h1>
        <p>当前站点未正确配置运行目录，请将 Web 服务器的根目录指向项目的 <strong>/public</strong> 文件夹。</p>

        <div class="tip-box">
            <h3>常见配置方式</h3>
            <ul>
                <li>cPanel / 宝塔面板：修改站点目录为程序根目录下的 <strong>public</strong></li>
                <li>Nginx：将 <strong>root</strong> 指向 <strong>/path/to/site/public</strong></li>
                <li>Apache：将 <strong>DocumentRoot</strong> 指向 <strong>/path/to/site/public</strong></li>
            </ul>
        </div>

        <code>DocumentRoot "/www/wwwroot/your-site/public"</code>

        <div class="footer">
            配置完成后刷新页面即可正常访问网站。
        </div>
    </div>
</body>
</html>
